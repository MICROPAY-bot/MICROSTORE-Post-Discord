name: MICROSTORE Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  autopost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Start backend
        working-directory: apps/backend
        run: node dist/server.js
        env:
          NODE_ENV: production
